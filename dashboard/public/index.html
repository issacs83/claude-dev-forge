<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jun.AI - PDLC Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <h1 class="logo">Jun<span class="logo-ai">.AI</span></h1>
      <span class="live-badge" id="liveBadge">● Live</span>
    </div>
    <div class="header-right">
      <span class="stat">Total: <b id="statTotal">0</b></span>
      <span class="stat">Active: <b id="statActive">0</b></span>
      <span class="stat">Done: <b id="statDone">0</b></span>
      <span class="stat">Rate: <b id="statRate">0%</b></span>
      <button class="btn-new-task" onclick="showNewTaskModal()">+ New Task</button>
    </div>
  </header>

  <!-- Project Bar (최상위 — 가장 큰 범위) -->
  <div class="filter-bar">
    <div class="filter-left">
      <label>Project:</label>
      <select class="filter-select" id="projectFilter" onchange="onProjectFilterChange()">
        <option value="all">All Projects</option>
      </select>
      <button class="btn-new-task" style="font-size:12px;padding:5px 10px;margin-left:4px" onclick="showNewProjectModal()">+ Project</button>
    </div>
    <div class="filter-right">
      <label>Role:</label>
      <div class="role-tabs" id="roleTabs">
        <button class="role-tab active" data-role="all">All</button>
        <button class="role-tab" data-role="management">management</button>
        <button class="role-tab" data-role="research">research</button>
        <button class="role-tab" data-role="ai-ml">ai-ml</button>
        <button class="role-tab" data-role="document">document</button>
        <button class="role-tab" data-role="test">test</button>
        <button class="role-tab" data-role="dev">dev</button>
      </div>
    </div>
  </div>

  <!-- PDLC Phase Progress Bar (프로젝트 하위) -->
  <div class="phase-bar">
    <div class="phase-bar-label">PDLC Progress</div>
    <div class="phase-track" id="phaseTrack"></div>
    <div class="phase-percent" id="phasePercent">0%</div>
  </div>

  <!-- Kanban Board (6 columns) -->
  <div class="kanban-board" id="kanbanBoard">
    <div class="kanban-column" data-status="todo"
         ondragover="allowDrop(event)" ondragleave="onDragLeave(event)" ondrop="onColumnDrop(event,'todo')">
      <div class="column-header todo">
        <span>📋 To Do</span>
        <span class="column-count" id="countTodo">0</span>
      </div>
      <div class="column-body" id="colTodo"></div>
    </div>
    <div class="kanban-column" data-status="hold"
         ondragover="allowDrop(event)" ondragleave="onDragLeave(event)" ondrop="onColumnDrop(event,'hold')">
      <div class="column-header hold">
        <span>⏸ Hold</span>
        <span class="column-count" id="countHold">0</span>
      </div>
      <div class="column-body" id="colHold"></div>
    </div>
    <div class="kanban-column" data-status="claimed"
         ondragover="allowDrop(event)" ondragleave="onDragLeave(event)" ondrop="onColumnDrop(event,'claimed')">
      <div class="column-header claimed">
        <span>👋 Claimed</span>
        <span class="column-count" id="countClaimed">0</span>
      </div>
      <div class="column-body" id="colClaimed"></div>
    </div>
    <div class="kanban-column" data-status="in_progress"
         ondragover="allowDrop(event)" ondragleave="onDragLeave(event)" ondrop="onColumnDrop(event,'in_progress')">
      <div class="column-header in_progress">
        <span>🔄 In Progress</span>
        <span class="column-count" id="countInProgress">0</span>
      </div>
      <div class="column-body" id="colInProgress"></div>
    </div>
    <div class="kanban-column" data-status="review"
         ondragover="allowDrop(event)" ondragleave="onDragLeave(event)" ondrop="onColumnDrop(event,'review')">
      <div class="column-header review">
        <span>🔍 Review</span>
        <span class="column-count" id="countReview">0</span>
      </div>
      <div class="column-body" id="colReview"></div>
    </div>
    <div class="kanban-column" data-status="done"
         ondragover="allowDrop(event)" ondragleave="onDragLeave(event)" ondrop="onColumnDrop(event,'done')">
      <div class="column-header done">
        <span>✅ Done</span>
        <span class="column-count" id="countDone">0</span>
      </div>
      <div class="column-body" id="colDone"></div>
    </div>
  </div>

  <!-- Claude Sessions Panel -->
  <div class="agent-panel" id="sessionPanel">
    <div class="panel-header" onclick="togglePanel('sessionPanel')">
      <span>Claude Sessions</span>
      <span class="toggle-icon">▼</span>
    </div>
    <div class="panel-body" id="sessionList"></div>
  </div>

  <!-- Agent Monitor Panel -->
  <div class="agent-panel" id="agentPanel">
    <div class="panel-header" onclick="togglePanel('agentPanel')">
      <span>Agent Monitor</span>
      <span class="toggle-icon">▼</span>
    </div>
    <div class="panel-body" id="agentList"></div>
  </div>

  <!-- Document Output Panel -->
  <div class="doc-panel" id="docPanel">
    <div class="panel-header" onclick="togglePanel('docPanel')">
      <span>Documents</span>
      <span class="toggle-icon">▼</span>
    </div>
    <div class="panel-body" id="docList"></div>
  </div>

  <!-- Notification Container (에이전트 완료 알림) -->
  <div class="notification-container" id="notificationContainer"></div>

  <!-- New Task Modal -->
  <div class="modal-overlay" id="newTaskModal" style="display:none">
    <div class="modal">
      <h3>New Task</h3>
      <input id="newTaskTitle" placeholder="Task title" />
      <select id="newTaskProject">
        <option value="">No Project</option>
      </select>
      <select id="newTaskPriority">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
        <option value="critical">Critical</option>
      </select>
      <select id="newTaskRole">
        <option value="management">management</option>
        <option value="research">research</option>
        <option value="ai-ml">ai-ml</option>
        <option value="document">document</option>
        <option value="test">test</option>
        <option value="dev">dev</option>
      </select>
      <div class="modal-actions">
        <button onclick="createTask()">Create</button>
        <button onclick="hideNewTaskModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Project Setup Wizard Modal -->
  <div class="modal-overlay" id="newProjectModal" style="display:none">
    <div class="modal" style="min-width:480px">
      <h3>New Project Setup</h3>
      <p style="color:var(--text-muted);font-size:13px;margin-bottom:12px">
        프로젝트를 생성하고 PDLC 12단계 태스크를 자동 셋업합니다.
      </p>

      <label style="color:var(--text-secondary);font-size:12px">프로젝트 이름 *</label>
      <input id="setupProjectName" placeholder="예: 스마트 카메라 v2.0" />

      <label style="color:var(--text-secondary);font-size:12px;margin-top:8px">설명</label>
      <input id="setupProjectDesc" placeholder="프로젝트 목표 및 범위" />

      <label style="color:var(--text-secondary);font-size:12px;margin-top:8px">도메인</label>
      <select id="setupProjectDomain">
        <option value="general">General (범용)</option>
        <option value="web-fullstack">Web Fullstack (React/Node.js)</option>
        <option value="yocto-bsp">Yocto BSP (임베디드 Linux)</option>
        <option value="firmware">Firmware (MCU/FPGA/RTOS)</option>
        <option value="ai-ml">AI/ML (학습/추론/배포)</option>
        <option value="hardware">Hardware (회로/기구/광학)</option>
      </select>

      <label style="color:var(--text-secondary);font-size:12px;margin-top:8px">PDLC 범위</label>
      <div id="phaseCheckboxes" style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:4px">
        <label class="phase-check"><input type="checkbox" value="0" checked> P0: 선행연구</label>
        <label class="phase-check"><input type="checkbox" value="1" checked> P1: VOC</label>
        <label class="phase-check"><input type="checkbox" value="2" checked> P2: 시장조사</label>
        <label class="phase-check"><input type="checkbox" value="3" checked> P3: 기획/디자인</label>
        <label class="phase-check"><input type="checkbox" value="4" checked> P4: 세부기획</label>
        <label class="phase-check"><input type="checkbox" value="5" checked> P5: 아키텍처</label>
        <label class="phase-check"><input type="checkbox" value="6" checked> P6: 파트별 설계</label>
        <label class="phase-check"><input type="checkbox" value="7" checked> P7: 세부설계</label>
        <label class="phase-check"><input type="checkbox" value="8" checked> P8: 구현</label>
        <label class="phase-check"><input type="checkbox" value="9" checked> P9: 테스트</label>
        <label class="phase-check"><input type="checkbox" value="10" checked> P10: 검증</label>
        <label class="phase-check"><input type="checkbox" value="11" checked> P11: 평가</label>
      </div>

      <label style="color:var(--text-secondary);font-size:12px;margin-top:8px">프로젝트 경로</label>
      <input id="setupProjectPath" placeholder="/home/issacs/work/my-project (선택)" />

      <label class="phase-check" style="margin-top:8px">
        <input type="checkbox" id="setupAutoSession" checked>
        Claude Code 세션 자동 시작 (tmux)
      </label>

      <div class="modal-actions" style="margin-top:16px">
        <button onclick="setupProject()">Setup & Start</button>
        <button onclick="hideNewProjectModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Assign Agent Modal -->
  <div class="modal-overlay" id="assignAgentModal" style="display:none">
    <div class="modal">
      <h3>에이전트 배정</h3>
      <div class="assign-info" id="assignInfo"></div>
      <div class="assign-agent-list" id="assignAgentList"></div>
      <div class="modal-actions">
        <button onclick="hideAssignModal()">취소</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
